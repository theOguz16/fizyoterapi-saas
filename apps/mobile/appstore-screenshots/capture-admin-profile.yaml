appId: com.fizyoflow.mobile
name: capture-admin-profile
---
- launchApp:
    clearState: true
    clearKeychain: true

- openLink: "fizyoflow://e2e-reset"

- assertVisible:
    id: "welcome-login-button"

- tapOn:
    id: "welcome-login-button"
    retryTapIfNoChange: true

- assertVisible: "Hesabına giriş yap"

- tapOn:
    id: "login-identity-input"
    retryTapIfNoChange: true
- inputText: "oguzhanuyar531@gmail.com"

- tapOn: "FizyoFlow hesabınla devam et"

- tapOn:
    id: "login-password-input"
    retryTapIfNoChange: true
- inputText: "admin123"

- tapOn:
    id: "login-submit-button"

- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: "Profil"

- waitForAnimationToEnd:
    timeout: 3000

- assertVisible: "Hesap özeti"
