appId: com.fizyoflow.mobile
---
# Bu flow, member katılımı admin tarafından onaylandıktan sonra çalıştırılır.
# Kontrol ettiği şeyler:
# 1) Member Paketlerim altında bağlı grup dersi görünüyor mu?
# 2) Trainer calendar detail sheet içinde derse katılan üye görünüyor mu?

- launchApp:
    clearState: true
    clearKeychain: true
- assertVisible:
    id: "welcome-login-button"
- tapOn:
    id: "welcome-login-button"
    retryTapIfNoChange: true
- tapOn:
    id: "login-identity-input"
    retryTapIfNoChange: true
- inputText: "member@gmail.com"
- tapOn: "Hesabına giriş yap"
- tapOn:
    id: "login-password-input"
    retryTapIfNoChange: true
- inputText: "member123"
- tapOn:
    id: "login-submit-button"
- waitForAnimationToEnd:
    timeout: 5000
- openLink: "fizyoflow://(member)/package"
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible: "Paketlerim"
- assertVisible: "Paket ve Geçmiş"
