appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 60000
- openLink: "fizyoflow://e2e-reset"
- openLink: "fizyoflow://e2e-login?email=member%40gmail.com&password=member123&redirect=%2F%28member%29%2Fhome"
- extendedWaitUntil:
    visible: "Kalan hak"
    timeout: 20000
- scrollUntilVisible:
    element:
      id: "member-home-measurements"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "member-home-measurements"
- assertVisible: "Ölçümlerim"
- tapOn:
    id: "member-measurements-add"
- assertVisible: "Yeni Ölçüm Ekle"
- tapOn:
    id: "measurement-height-input"
- inputText: "178"
- tapOn: "Done"
- tapOn:
    id: "measurement-weight-input"
- inputText: "74"
- tapOn: "Done"
- tapOn:
    id: "measurement-fat-input"
- inputText: "18"
- tapOn: "Done"
- tapOn:
    id: "measurement-muscle-input"
- inputText: "31"
- tapOn: "Done"
- tapOn:
    id: "measurement-note-input"
- inputText: "Smoke test measurement"
- tapOn: "Bitti"
- scrollUntilVisible:
    element:
      id: "measurement-save-button"
    direction: DOWN
    timeout: 10000
- tapOn:
    point: "50%,82%"
- extendedWaitUntil:
    visible: "Ölçümlerim"
    timeout: 15000
- assertVisible: "Özet & Grafik"
- tapOn:
    id: "member-measurements-tab-HISTORY"
- assertVisible: "Geçmiş Ölçümler"
- assertVisible: "Smoke test measurement"
