appId: com.fizyoflow.mobile
---
# Manuel QR içeriği önce gerçek doğrulama hatasını, sonra geçerli klinik bağlamını üretir.
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible:
      id: "welcome-scan-salon-qr-button"
    timeout: 60000
- tapOn:
    id: "welcome-scan-salon-qr-button"
- extendedWaitUntil:
    visible:
      id: "salon-qr-screen"
    timeout: 20000
- tapOn:
    id: "salon-qr-mode-manual"
- tapOn:
    id: "salon-qr-manual-input"
- inputText: "gecersiz-klinik-kodu"
- tapOn:
    id: "salon-qr-manual-submit"
- extendedWaitUntil:
    visible: "Bu QR salon onboarding kodu değil. Admin salon QR ekranındaki kodu okutman gerekiyor."
    timeout: 10000
- tapOn:
    id: "salon-qr-manual-input"
- eraseText
- inputText: "https://fizyoflow.com/join/demo-salon?code=FYF-DEMO-SALON-001"
- tapOn:
    id: "salon-qr-manual-submit"
- extendedWaitUntil:
    visible:
      id: "intake-packages-screen"
    timeout: 30000
- assertVisible: "Klinik paketleri"
- assertVisible:
    id: "intake-package-card-0"

# Keşif listesinden gerçek klinik detayına girilir; seçim değiştirme ve bağlantı iptali UI ile yapılır.
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 120000
- openLink: "fizyoflow://(intake-member)/salons"
- extendedWaitUntil:
    visible:
      id: "member-salons-screen"
    timeout: 20000
- scrollUntilVisible:
    element:
      id: "member-salon-open-demo-salon"
    direction: DOWN
    timeout: 20000
- tapOn:
    id: "member-salon-open-demo-salon"
- extendedWaitUntil:
    visible:
      id: "salon-detail-screen"
    timeout: 20000
- scrollUntilVisible:
    element:
      id: "salon-choose-another-button"
    direction: DOWN
    timeout: 20000
- tapOn:
    id: "salon-choose-another-button"
- extendedWaitUntil:
    visible:
      id: "member-salons-screen"
    timeout: 15000
- scrollUntilVisible:
    element:
      id: "member-salon-open-demo-salon"
    direction: DOWN
    timeout: 20000
- tapOn:
    id: "member-salon-open-demo-salon"
- extendedWaitUntil:
    visible:
      id: "salon-detail-screen"
    timeout: 20000
- scrollUntilVisible:
    element:
      id: "salon-cancel-connection-button"
    direction: DOWN
    timeout: 20000
- tapOn:
    id: "salon-cancel-connection-button"
- extendedWaitUntil:
    visible:
      id: "member-connect-discovery"
    timeout: 15000
