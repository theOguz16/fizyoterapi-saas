appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- openLink: "fizyoflow://e2e-reset"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "Aç"
    commands:
      - tapOn: "Aç"
- openLink: "fizyoflow://e2e-login?email=member%40gmail.com&password=member123&redirect=%2F%28member%29%2Fbookings"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "Aç"
    commands:
      - tapOn: "Aç"
- extendedWaitUntil:
    visible:
      id: "member-bookings-screen"
    timeout: 20000
- assertVisible:
    id: "member-bookings-segment"
- tapOn:
    id: "member-bookings-segment-history"
- tapOn:
    id: "member-bookings-segment-upcoming"
