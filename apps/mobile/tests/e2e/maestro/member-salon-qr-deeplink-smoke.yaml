appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- openLink: "fizyoflow://join/demo-salon?code=FYF-DEMO-SALON-001"
- extendedWaitUntil:
    visible:
      id: "intake-packages-screen"
    timeout: 20000
- assertVisible: "Klinik paketleri"
- assertNotVisible: "Salon detayını inceliyorsun"
- scrollUntilVisible:
    element:
      id: "intake-package-card-0"
    direction: DOWN
    timeout: 15000
- assertVisible:
    id: "intake-package-card-0"
