appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- openLink: "fizyoflow://join/demo-salon?code=FYF-DEMO-SALON-001"
- extendedWaitUntil:
    visible:
      id: "salon-detail-screen"
    timeout: 20000
- scrollUntilVisible:
    element:
      id: "salon-view-packages-button"
    direction: DOWN
    timeout: 15000
- assertVisible:
    id: "salon-view-packages-button"
