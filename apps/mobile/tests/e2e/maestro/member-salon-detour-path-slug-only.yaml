appId: com.fizyoflow.mobile
name: member-salon-detour-path-slug-only
---
- launchApp:
    clearState: true
    clearKeychain: true

- openLink: "fizyoflow://e2e-reset"

- waitForAnimationToEnd:
    timeout: 3000

# salon_slug parametresi yok. Slug path'ten yakalanmalı.
- openLink: "fizyoflow://join/demo-salon?salon_slug=demo-salon&source=salon_qr&channel=qr"

- extendedWaitUntil:
    visible:
      text: "Demo-Salon|demo-salon|Paket|Kayıt|Salon|FizyoFlow"
    timeout: 20000

- assertVisible:
    text: "Demo-Salon|demo-salon|Paket|Kayıt|Salon|FizyoFlow"
