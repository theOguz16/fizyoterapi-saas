appId: com.clinerva.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- assertVisible: "Clinerva"
- openLink: "clinerva://e2e-reset"
- assertVisible:
    id: "welcome-login-button"
- tapOn:
    id: "welcome-login-button"
    retryTapIfNoChange: true
- assertVisible: "Hesabına giriş yap"
- tapOn:
    id: "login-identity-input"
- inputText: "oguzhanuyar531@gmail.com"
- tapOn: "Clinerva hesabınla devam et"
- tapOn:
    id: "login-password-input"
- inputText: "admin123"
- tapOn: "Clinerva hesabınla devam et"
- tapOn:
    id: "login-submit-button"
- waitForAnimationToEnd
- openLink: "clinerva://(admin)/approvals"
- waitForAnimationToEnd
- assertVisible: "Onaylar"
- assertVisible: "katılımı"
- tapOn: "Detayı aç"
- waitForAnimationToEnd
- assertVisible: "Grup dersi detayı"
- tapOn: "Onayla"
- waitForAnimationToEnd
- assertVisible: "Onaylar"
