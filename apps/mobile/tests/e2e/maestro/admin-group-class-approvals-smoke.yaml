appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- assertVisible: "FizyoFlow"
- openLink: "fizyoflow://e2e-reset"
- assertVisible:
    id: "welcome-login-button"
- tapOn:
    id: "welcome-login-button"
    retryTapIfNoChange: true
- assertVisible: "Hesabına giriş yap"
- tapOn:
    id: "login-identity-input"
- inputText: "oguzhanuyar531@gmail.com"
- tapOn: "Hesabına giriş yap"
- tapOn:
    id: "login-password-input"
- inputText: "admin123"
- tapOn:
    id: "login-submit-button"
- waitForAnimationToEnd
- openLink: "fizyoflow://(admin)/approvals"
- waitForAnimationToEnd
- assertVisible: "Onaylar"
- extendedWaitUntil:
    visible: "Bekleyen"
    timeout: 15000
