appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 120000
- openLink: "fizyoflow://e2e-reset"
- openLink: "fizyoflow://e2e-login?email=member%40gmail.com&password=member123&redirect=%2F%28member%29%2Freferrals"
- extendedWaitUntil:
    visible:
      id: "member-referral-name-input"
    timeout: 20000
- tapOn:
    id: "member-referral-name-input"
- inputText: "E2E Davetli"
- pressKey: ENTER
- tapOn:
    id: "member-referral-contact-input"
- inputText: "e2e.referral@demo.local"
- pressKey: ENTER
- scrollUntilVisible:
    element:
      id: "member-referral-submit"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "member-referral-submit"
- scrollUntilVisible:
    element:
      text: "E2E Davetli"
    direction: DOWN
    timeout: 15000
- assertVisible: "E2E Davetli"
- assertVisible: "e2e.referral@demo.local"
