appId: com.fizyoflow.mobile
name: trainer-salon-qr-ignored
---
- launchApp:
    clearState: true
    clearKeychain: true

- openLink: "fizyoflow://e2e-reset"

- assertVisible:
    id: "welcome-login-button"

- tapOn:
    id: "welcome-login-button"
    retryTapIfNoChange: true

- assertVisible: "Hesabına giriş yap"

- tapOn:
    id: "login-identity-input"
    retryTapIfNoChange: true
- inputText: "elisauyar@gmail.com"

- tapOn: "Hesabına giriş yap"

- tapOn:
    id: "login-password-input"
    retryTapIfNoChange: true
- inputText: "trainer123"


- tapOn:
    id: "login-submit-button"

- waitForAnimationToEnd:
    timeout: 5000

- assertVisible:
    id: "trainer-home-screen"

# Trainer QR açsa bile member salon onboarding'e sokulmamalı.
- openLink: "fizyoflow://join/demo-salon?salon_slug=demo-salon&screen_path=%2F%28intake-member%29%2Fsalons%2Fdemo-salon&source=salon_qr&channel=qr"

- waitForAnimationToEnd:
    timeout: 5000

- assertVisible:
    id: "trainer-home-screen"