appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- openLink: "fizyoflow://e2e-reset"
- assertVisible:
    id: "welcome-login-button"
- tapOn:
    id: "welcome-login-button"
    retryTapIfNoChange: true
- assertVisible:
    id: "login-identity-input"
- tapOn:
    id: "login-identity-input"
    retryTapIfNoChange: true
- inputText: "member@gmail.com"
- assertVisible:
    id: "login-password-input"
- tapOn:
    id: "login-password-input"
    retryTapIfNoChange: true
- inputText: "member123"
- tapOn:
    id: "login-submit-button"
- extendedWaitUntil:
    visible:
      id: "member-home-screen"
    timeout: 20000
- assertVisible:
    id: "member-home-profile-button"
