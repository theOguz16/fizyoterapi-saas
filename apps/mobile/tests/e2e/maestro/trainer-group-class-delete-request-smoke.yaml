appId: com.clinerva.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true

- assertVisible:
    id: "welcome-login-button"

- tapOn:
    id: "welcome-login-button"
    retryTapIfNoChange: true

- assertVisible: "Hesabına giriş yap"

- tapOn:
    id: "login-identity-input"
    retryTapIfNoChange: true

- inputText: "elisauyar@gmail.com"

- tapOn: "Clinerva hesabınla devam et"

- tapOn:
    id: "login-password-input"
    retryTapIfNoChange: true

- inputText: "trainer123"

- tapOn: "Clinerva hesabınla devam et"

- tapOn:
    id: "login-submit-button"

- waitForAnimationToEnd:
    timeout: 5000

- openLink: "clinerva://(trainer)/group-classes"

- waitForAnimationToEnd:
    timeout: 5000

- assertVisible: "Grup dersleri"

- scrollUntilVisible:
    element: "E2E Aksam Pilates"
    direction: DOWN
    timeout: 20000
    speed: 40
    visibilityPercentage: 30
    waitToSettleTimeoutMs: 500

- assertVisible: "E2E Aksam Pilates"

- scrollUntilVisible:
    element:
      id: "trainer-group-classes-delete-e2e-aksam-pilates"
    direction: DOWN
    timeout: 12000
    speed: 40
    visibilityPercentage: 30
    waitToSettleTimeoutMs: 500

- assertVisible:
    id: "trainer-group-classes-delete-e2e-aksam-pilates"