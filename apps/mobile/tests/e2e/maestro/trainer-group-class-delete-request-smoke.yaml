appId: com.fizyoflow.mobile
---
- runFlow: trainer-group-classes-full-smoke.yaml

- launchApp:
    clearState: true
    clearKeychain: true

- openLink: "fizyoflow://e2e-reset"
- openLink: "fizyoflow://e2e-login?email=elisauyar%40gmail.com&password=trainer123&redirect=%2F%28trainer%29%2Fgroup-classes"

- extendedWaitUntil:
    visible: "Grup dersleri|E2E Aksam Pilates|Dersler"
    timeout: 20000

- scrollUntilVisible:
    element: "E2E Aksam Pilates"
    direction: DOWN
    timeout: 20000
    speed: 40
    visibilityPercentage: 30
    waitToSettleTimeoutMs: 500

- assertVisible: "E2E Aksam Pilates"

- scrollUntilVisible:
    element:
      id: "trainer-group-classes-delete-e2e-aksam-pilates"
    direction: DOWN
    timeout: 12000
    speed: 40
    visibilityPercentage: 30
    waitToSettleTimeoutMs: 500

- assertVisible:
    id: "trainer-group-classes-delete-e2e-aksam-pilates"
