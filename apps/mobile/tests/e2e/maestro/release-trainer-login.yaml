appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- openLink: "fizyoflow://e2e-reset"
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 15000
- tapOn:
    id: "welcome-login-button"
- tapOn:
    id: "login-identity-input"
- inputText: "elisauyar@gmail.com"
- tapOn:
    id: "login-password-input"
- inputText: "trainer123"
- tapOn:
    id: "login-submit-button"
- extendedWaitUntil:
    visible:
      id: "trainer-home-screen"
    timeout: 20000
- assertVisible:
    id: "trainer-home-qr-button"
