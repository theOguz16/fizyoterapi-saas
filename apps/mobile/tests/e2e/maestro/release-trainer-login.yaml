appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- openLink: "fizyoflow://e2e-reset"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "Aç"
    commands:
      - tapOn: "Aç"
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 15000
- tapOn:
    id: "welcome-login-button"
- tapOn:
    id: "login-identity-input"
- inputText: "elisauyar@gmail.com"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "login-password-input"
    direction: DOWN
- tapOn:
    id: "login-password-input"
    retryTapIfNoChange: true
- inputText: "trainer123"
- tapOn:
    id: "login-submit-button"
- runFlow:
    when:
      visible: "Sonra"
    commands:
      - tapOn: "Sonra"
- extendedWaitUntil:
    visible:
      id: "trainer-home-screen"
    timeout: 20000
- assertVisible:
    id: "trainer-home-qr-button"
