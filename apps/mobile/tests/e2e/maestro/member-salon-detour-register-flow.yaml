appId: com.fizyoflow.mobile
name: member-salon-detour-register-flow
---
- launchApp:
    clearState: true
    clearKeychain: true

- openLink: "fizyoflow://e2e-reset"

- waitForAnimationToEnd:
    timeout: 3000

- openLink: "fizyoflow://join/demo-salon?salon_slug=demo-salon&screen_path=%2F%28intake-member%29%2Fsalons%2Fdemo-salon&source=salon_qr&channel=qr"

- extendedWaitUntil:
    visible:
      text: "Demo-Salon|demo-salon|Paket|Salon|FizyoFlow"
    timeout: 20000

- assertVisible:
    text: "Demo-Salon|demo-salon|Paket|Salon|FizyoFlow"

# Önce salon ekranında Paketleri Gör butonunu bul.
- scrollUntilVisible:
    element:
      text: "Paketleri Gör|Paketleri gör|Paketleri İncele|Paketleri incele"
    direction: DOWN
    timeout: 20000
    speed: 40
    visibilityPercentage: 30
    centerElement: false
    optional: true

- assertVisible:
    text: "Paketleri Gör|Paketleri gör|Paketleri İncele|Paketleri incele|Demo-Salon|demo-salon|Salon|FizyoFlow"
