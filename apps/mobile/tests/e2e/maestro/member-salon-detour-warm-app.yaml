appId: com.fizyoflow.mobile
name: member-salon-detour-warm-app
---
- launchApp:
    clearState: true
    clearKeychain: true

- openLink: "fizyoflow://e2e-reset"

- waitForAnimationToEnd:
    timeout: 3000

- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 20000

# Uygulama zaten açıkken QR/deep link geliyor.
- openLink: "fizyoflow://join/demo-salon?salon_slug=demo-salon&screen_path=%2F%28intake-member%29%2Fsalons%2Fdemo-salon&source=salon_qr&channel=qr"

- extendedWaitUntil:
    visible:
      text: "Demo-Salon|demo-salon|Paket|Kayıt|Salon|FizyoFlow"
    timeout: 20000

- assertVisible:
    text: "Demo-Salon|demo-salon|Paket|Kayıt|Salon|FizyoFlow"
