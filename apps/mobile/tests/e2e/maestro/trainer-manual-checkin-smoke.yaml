appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- openLink: "fizyoflow://e2e-login?email=elisauyar%40gmail.com&password=trainer123&redirect=%2F%28trainer%29%2Fhome"
- extendedWaitUntil:
    visible:
      id: "trainer-home-screen"
    timeout: 20000
- tapOn:
    id: "trainer-home-qr-button"
- waitForAnimationToEnd
- assertVisible:
    id: "trainer-checkin-screen"
- swipe:
    start: 50%, 82%
    end: 50%, 36%
- tapOn:
    id: "trainer-checkin-manual-mode"
- assertVisible:
    id: "trainer-checkin-manual-input"
- tapOn:
    id: "trainer-checkin-manual-input"
- inputText: "MEM-DEMO001"
- tapOn:
    id: "trainer-checkin-submit"
- assertVisible:
    id: "trainer-checkin-result"
