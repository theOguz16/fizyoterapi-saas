appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- openLink: "fizyoflow://e2e-reset"
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 20000
- openLink: "fizyoflow://e2e-login?email=elisauyar%40gmail.com&password=trainer123&redirect=%2F%28trainer%29%2Fgroup-classes"
- extendedWaitUntil:
    visible: "Grup dersleri"
    timeout: 20000

# Cleanup previous E2E rows if they exist
- swipe:
    start: 50%, 82%
    end: 50%, 18%
- tapOn:
    id: "trainer-group-classes-delete-e2e-aksam-pilates"
    optional: true
- tapOn:
    text: "OK"
    optional: true
- tapOn:
    id: "trainer-group-classes-delete-e2e-aksam-pilates-guncel"
    optional: true
- tapOn:
    text: "OK"
    optional: true
- tapOn:
    id: "trainer-group-classes-delete-e2e-davetli-grup"
    optional: true
- tapOn:
    text: "OK"
    optional: true
- tapOn:
    id: "trainer-group-classes-delete-e2e-davetli-grup-guncel"
    optional: true
- tapOn:
    text: "OK"
    optional: true
- swipe:
    start: 50%, 24%
    end: 50%, 82%
- swipe:
    start: 50%, 24%
    end: 50%, 82%

# Special + public create
- swipe:
    start: 50%, 82%
    end: 50%, 58%
- tapOn:
    id: "trainer-group-classes-name-input"
- eraseText
- inputText: "E2E Aksam Pilates"
- tapOn:
    point: "50%,25%"
- swipe:
    start: 50%, 78%
    end: 50%, 52%
- tapOn:
    id: "trainer-group-classes-date-picker"
- tapOn:
    id: "trainer-group-classes-date-option-5"
- tapOn:
    id: "trainer-group-classes-time-picker"
- tapOn:
    id: "trainer-group-classes-time-option-0"
- swipe:
    start: 50%, 78%
    end: 50%, 22%
- tapOn:
    id: "trainer-group-classes-submit"
- assertVisible: "Grup dersi onaya gönderildi"
- tapOn:
    text: "OK"
    optional: true
