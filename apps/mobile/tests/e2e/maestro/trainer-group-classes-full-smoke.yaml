appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 60000
- openLink: "fizyoflow://e2e-reset"
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 20000
- openLink: "fizyoflow://e2e-login?email=elisauyar%40gmail.com&password=trainer123&redirect=%2F%28trainer%29%2Fgroup-classes"
- extendedWaitUntil:
    visible: "Grup dersleri"
    timeout: 20000

# Special + public create
- swipe:
    start: 50%, 82%
    end: 50%, 58%
- tapOn:
    id: "trainer-group-classes-name-input"
- eraseText
- inputText: "E2E Aksam Pilates"
- tapOn:
    point: "50%,25%"
- swipe:
    start: 50%, 78%
    end: 50%, 52%
- tapOn:
    id: "trainer-group-classes-date-picker"
- tapOn:
    id: "trainer-group-classes-date-option-5"
- tapOn:
    id: "trainer-group-classes-time-picker"
- tapOn:
    id: "trainer-group-classes-time-option-0"
- swipe:
    start: 50%, 78%
    end: 50%, 22%
- tapOn:
    id: "trainer-group-classes-submit"
- assertVisible: "Grup dersi onaya gönderildi"
- tapOn: "Tamam|OK"
- scrollUntilVisible:
    element:
      id: "trainer-group-classes-edit-e2e-aksam-pilates"
    direction: DOWN
    timeout: 20000
- tapOn:
    id: "trainer-group-classes-edit-e2e-aksam-pilates"
- scrollUntilVisible:
    element:
      id: "trainer-group-classes-name-input"
    direction: UP
    timeout: 15000
- tapOn:
    id: "trainer-group-classes-name-input"
- eraseText
- inputText: "E2E Aksam Pilates Guncel"
- scrollUntilVisible:
    element:
      id: "trainer-group-classes-submit"
    direction: DOWN
    timeout: 15000
- tapOn:
    id: "trainer-group-classes-submit"
- extendedWaitUntil:
    visible: "Güncelleme onaya gönderildi"
    timeout: 20000
- tapOn: "Tamam|OK"
- scrollUntilVisible:
    element:
      id: "trainer-group-classes-delete-e2e-aksam-pilates-guncel"
    direction: DOWN
    timeout: 20000
- tapOn:
    id: "trainer-group-classes-delete-e2e-aksam-pilates-guncel"
- extendedWaitUntil:
    visible: "Silme talebi gönderildi"
    timeout: 20000
