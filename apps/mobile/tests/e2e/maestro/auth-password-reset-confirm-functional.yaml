appId: com.fizyoflow.mobile
name: auth-password-reset-confirm-functional
---
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 60000
- openLink: "fizyoflow://reset-password?token=fizyoflow-e2e-password-reset-token-2026"
- extendedWaitUntil:
    visible:
      id: "password-reset-confirm-submit"
    timeout: 10000
- scrollUntilVisible:
    element:
      id: "password-reset-password-input"
    direction: DOWN
    timeout: 10000
- waitForAnimationToEnd
- tapOn:
    id: "password-reset-password-input"
- inputText: "password-new123"
- scrollUntilVisible:
    element:
      id: "password-reset-repeat-input"
    direction: DOWN
    timeout: 10000
- assertVisible:
    id: "password-reset-repeat-input"
- tapOn: "E-postandaki bağlantıyı aç.*"
- tapOn:
    id: "password-reset-confirm-submit"
- extendedWaitUntil:
    visible:
      id: "password-reset-success"
    timeout: 15000
- tapOn:
    id: "password-reset-login"
- tapOn:
    id: "login-identity-input"
- inputText: "password.reset.e2e@demo.local"
- pressKey: ENTER
- scrollUntilVisible:
    element:
      id: "login-password-input"
    direction: DOWN
    timeout: 10000
- waitForAnimationToEnd
- tapOn:
    id: "login-password-input"
- inputText: "password-new123"
- pressKey: ENTER
- tapOn:
    id: "login-submit-button"
- extendedWaitUntil:
    visible:
      id: "admin-clinic-activation-step-1"
    timeout: 20000
