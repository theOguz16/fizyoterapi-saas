appId: com.clinerva.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- assertVisible: "Clinerva"
- openLink: "clinerva://e2e-reset"
- assertVisible:
    id: "welcome-login-button"
- tapOn:
    id: "welcome-login-button"
    retryTapIfNoChange: true
- assertVisible: "Hesabına giriş yap"
- assertVisible:
    id: "login-identity-input"
- tapOn:
    id: "login-identity-input"
    retryTapIfNoChange: true
- inputText: "oguzhanuyar531@gmail.com"
- tapOn: "Clinerva hesabınla devam et"
- assertVisible:
    id: "login-password-input"
- tapOn:
    id: "login-password-input"
    retryTapIfNoChange: true
- inputText: "admin123"
- tapOn: "Clinerva hesabınla devam et"
- tapOn:
    id: "login-submit-button"
- assertVisible: "Yönetim merkezi"
- swipe:
    start: 50%, 82%
    end: 50%, 28%
- tapOn:
    id: "admin-dashboard-packages"
- assertVisible: "Paketler"
- tapOn:
    id: "admin-package-title-input"
- inputText: "QA Smoke Paket"
- tapOn:
    id: "admin-package-credits-input"
- eraseText
- inputText: "6"
- tapOn:
    id: "admin-package-duration-input"
- eraseText
- inputText: "21"
- tapOn:
    id: "admin-package-price-input"
- eraseText
- inputText: "4200"
- tapOn:
    id: "admin-package-commission-input"
- eraseText
- inputText: "30"
- tapOn:
    id: "admin-package-capacity-input"
- eraseText
- inputText: "1"
- tapOn:
    id: "admin-package-summary-input"
- inputText: "Smoke package create flow"
- tapOn:
    id: "admin-package-save-button"
- assertVisible: "QA Smoke Paket"
