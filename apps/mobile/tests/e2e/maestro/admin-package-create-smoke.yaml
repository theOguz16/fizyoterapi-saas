appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- openLink: "fizyoflow://e2e-reset"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "Aç"
    commands:
      - tapOn: "Aç"
- openLink: "fizyoflow://e2e-login?email=oguzhanuyar531%40gmail.com&password=admin123&redirect=%2F%28admin%29%2Fdashboard"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "Aç"
    commands:
      - tapOn: "Aç"
- waitForAnimationToEnd:
    timeout: 8000
- extendedWaitUntil:
    visible:
      id: "admin-dashboard-screen"
    timeout: 20000
- swipe:
    start: 50%, 82%
    end: 50%, 28%
- tapOn:
    id: "admin-dashboard-packages"
- extendedWaitUntil:
    visible:
      id: "admin-packages-screen"
    timeout: 15000
- scrollUntilVisible:
    element:
      id: "admin-package-title-input"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "admin-package-title-input"
- inputText: "QA Smoke Paket"
- scrollUntilVisible:
    element:
      id: "admin-package-save-button"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "admin-package-save-button"
- assertVisible:
    id: "admin-package-save-button"
- waitForAnimationToEnd:
    timeout: 3000
- scrollUntilVisible:
    element:
      id: "admin-package-edit-qa-smoke-paket"
    direction: DOWN
    timeout: 10000
