appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- openLink: "fizyoflow://e2e-reset"
- openLink: "fizyoflow://e2e-login?email=oguzhanuyar531%40gmail.com&password=admin123&redirect=%2F%28admin%29%2Fdashboard"
- waitForAnimationToEnd:
    timeout: 8000
- assertVisible: "Yönetim merkezi"
- swipe:
    start: 50%, 82%
    end: 50%, 28%
- tapOn:
    id: "admin-dashboard-packages"
- assertVisible: "Paketler"
- scrollUntilVisible:
    element:
      id: "admin-package-title-input"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "admin-package-title-input"
- inputText: "QA Smoke Paket"
- scrollUntilVisible:
    element:
      id: "admin-package-save-button"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "admin-package-save-button"
- assertVisible: "Paket oluşturuldu"
- tapOn:
    text: "OK"
    optional: true
- tapOn:
    text: "Tamam"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- scrollUntilVisible:
    element:
      text: "QA Smoke Paket"
    direction: DOWN
    timeout: 10000
