appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 60000
- openLink: "fizyoflow://e2e-reset"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "Aç"
    commands:
      - tapOn: "Aç"
- openLink: "fizyoflow://e2e-login?email=oguzhanuyar531%40gmail.com&password=admin123&redirect=%2F%28admin%29%2Fdashboard"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "Aç"
    commands:
      - tapOn: "Aç"
- waitForAnimationToEnd:
    timeout: 8000
- extendedWaitUntil:
    visible:
      id: "admin-dashboard-screen"
    timeout: 20000
- swipe:
    start: 50%, 82%
    end: 50%, 28%
- tapOn:
    id: "admin-dashboard-packages"
- extendedWaitUntil:
    visible:
      id: "admin-packages-screen"
    timeout: 15000
- scrollUntilVisible:
    element:
      id: "admin-package-title-input"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "admin-package-title-input"
- eraseText
- inputText: "E2E CRUD Paket"
- pressKey: Enter
- scrollUntilVisible:
    element:
      id: "admin-package-weekly-hours-input"
    direction: DOWN
    timeout: 10000
    centerElement: true
- assertVisible:
    id: "admin-package-weekly-hours-input"
- scrollUntilVisible:
    element:
      id: "admin-package-save-button"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "admin-package-save-button"
- assertVisible: "Paket oluşturuldu"
- tapOn: "OK"
- waitForAnimationToEnd:
    timeout: 3000
- scrollUntilVisible:
    element:
      id: "admin-package-edit-e2e-crud-paket"
    direction: DOWN
    timeout: 10000
    centerElement: true
- tapOn:
    id: "admin-package-edit-e2e-crud-paket"
- scrollUntilVisible:
    element: "Değişiklikleri kaydet"
    direction: UP
    timeout: 20000
    visibilityPercentage: 80
    centerElement: true
- tapOn: "Değişiklikleri kaydet"
- extendedWaitUntil:
    visible: "Paket güncellendi"
    timeout: 15000
- tapOn: "OK"
- scrollUntilVisible:
    element:
      id: "admin-package-toggle-status-e2e-crud-paket"
    direction: DOWN
    timeout: 15000
- tapOn:
    id: "admin-package-toggle-status-e2e-crud-paket"
- assertVisible: "Paket pasife alındı"
- tapOn: "OK"
- tapOn: "Pasif"
- extendedWaitUntil:
    visible:
      id: "admin-package-edit-e2e-crud-paket"
    timeout: 20000
