appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true

- openLink: "fizyoflow://e2e-reset"
- openLink: "fizyoflow://e2e-login?email=member%40gmail.com&password=member123&redirect=%2F%28member%29%2Fhome"
- extendedWaitUntil:
    visible: "Merhaba Demo|Kalan hak|Sonraki ders|Profil|FizyoFlow"
    timeout: 20000

# Member aktif demo-salon'a bağlıyken farklı salon QR simülasyonu.
- openLink: "fizyoflow://join/baska-salon?salon_slug=baska-salon&screen_path=%2F%28intake-member%29%2Fsalons%2Fbaska-salon&source=salon_qr&channel=qr"

- waitForAnimationToEnd:
    timeout: 5000

# Yeni salon onboarding açılmamalı, member ana akışta kalmalı.
- assertVisible:
    text: "Merhaba Demo|Kalan hak|Sonraki ders|Profil|FizyoFlow"
