appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true

- tapOn:
    text: "Aç"
    optional: true

- openLink: "fizyoflow://e2e-reset"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible:
    id: "welcome-login-button"
- tapOn:
    id: "welcome-login-button"
- tapOn:
    id: "login-identity-input"
- inputText: "member@gmail.com"
- tapOn: "Hesabına giriş yap"
- tapOn:
    id: "login-password-input"
- inputText: "member123"
- tapOn:
    id: "login-submit-button"
- extendedWaitUntil:
    visible:
      id: "member-home-profile-button"
    timeout: 20000

# Member aktif demo-salon'a bağlıyken farklı salon QR simülasyonu.
- openLink: "fizyoflow://join/baska-salon?salon_slug=baska-salon&screen_path=%2F%28intake-member%29%2Fsalons%2Fbaska-salon&source=salon_qr&channel=qr"

- waitForAnimationToEnd:
    timeout: 5000

# Yeni salon onboarding açılmamalı, member ana akışta kalmalı.
- assertVisible:
    id: "member-home-profile-button"
