appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true

- openLink: "fizyoflow://e2e-reset"

- waitForAnimationToEnd:
    timeout: 2000

- runFlow:
    when:
      visible: "Aç"
    commands:
      - tapOn: "Aç"

- openLink: "fizyoflow://e2e-login?email=member%40gmail.com&password=member123&redirect=%2F%28member%29%2Fcalendar"

- waitForAnimationToEnd:
    timeout: 2000

- runFlow:
    when:
      visible: "Aç"
    commands:
      - tapOn: "Aç"

- waitForAnimationToEnd:
    timeout: 8000

- extendedWaitUntil:
    visible:
      id: "member-calendar-screen"
    timeout: 20000

- assertVisible: "Haftalık Takvim"
