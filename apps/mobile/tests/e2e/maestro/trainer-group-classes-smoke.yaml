appId: com.clinerva.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true

- openLink: "clinerva://e2e-reset"

- assertVisible:
    id: "welcome-login-button"

- tapOn:
    id: "welcome-login-button"
    retryTapIfNoChange: true

- assertVisible: "Hesabına giriş yap"

- tapOn:
    id: "login-identity-input"
    retryTapIfNoChange: true

- inputText: "elisauyar@gmail.com"

- tapOn: "Clinerva hesabınla devam et"

- tapOn:
    id: "login-password-input"
    retryTapIfNoChange: true

- inputText: "trainer123"

- tapOn: "Clinerva hesabınla devam et"

- tapOn:
    id: "login-submit-button"

- waitForAnimationToEnd:
    timeout: 5000

- openLink: "clinerva://(trainer)/group-classes"

- waitForAnimationToEnd:
    timeout: 5000

- assertVisible: "Grup dersleri"

- assertVisible:
    id: "trainer-group-classes-name-input"

- tapOn:
    id: "trainer-group-classes-name-input"

- eraseText: 50

- inputText: "E2E Aksam Pilates"

- hideKeyboard

- scrollUntilVisible:
    element:
      id: "trainer-group-classes-date-picker"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "trainer-group-classes-date-picker"

- tapOn:
    id: "trainer-group-classes-date-option-5"

- tapOn:
    id: "trainer-group-classes-time-picker"

- waitForAnimationToEnd:
    timeout: 2000

- tapOn:
    id: "trainer-group-classes-time-option-0"

- scrollUntilVisible:
    element:
      id: "trainer-group-classes-submit"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "trainer-group-classes-submit"

- waitForAnimationToEnd:
    timeout: 6000

- assertVisible: "Grup dersi onaya gönderildi"

- tapOn:
    text: "Tamam"
    optional: true

- tapOn:
    text: "OK"
    optional: true

- scrollUntilVisible:
    element: "Aktif kayıtlar"
    direction: DOWN
    timeout: 10000

- scrollUntilVisible:
    element: "E2E Aksam Pilates"
    direction: DOWN
    timeout: 15000
    speed: 40
    visibilityPercentage: 50
    waitToSettleTimeoutMs: 500

- assertVisible: "E2E Aksam Pilates"

- assertVisible: "Onay Bekliyor"