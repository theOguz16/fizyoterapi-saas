appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true

- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 60000

- openLink: "fizyoflow://e2e-reset"

- openLink: "fizyoflow://e2e-login?email=elisauyar%40gmail.com&password=trainer123&redirect=%2F%28trainer%29%2Fgroup-classes"

- waitForAnimationToEnd:
    timeout: 5000

- assertVisible: "Grup dersleri"

- assertVisible:
    id: "trainer-group-classes-name-input"

- tapOn:
    id: "trainer-group-classes-name-input"

- eraseText: 50

- inputText: "E2E Aksam Pilates"

- tapOn:
    point: "50%,25%"

- scrollUntilVisible:
    element:
      id: "trainer-group-classes-date-picker"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "trainer-group-classes-date-picker"

- tapOn:
    id: "trainer-group-classes-date-option-5"

- tapOn:
    id: "trainer-group-classes-time-picker"

- waitForAnimationToEnd:
    timeout: 2000

- tapOn:
    id: "trainer-group-classes-time-option-0"

- scrollUntilVisible:
    element:
      id: "trainer-group-classes-submit"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "trainer-group-classes-submit"

- waitForAnimationToEnd:
    timeout: 6000

- assertVisible: "Grup dersi onaya gönderildi"

- scrollUntilVisible:
    element: "Aktif kayıtlar"
    direction: DOWN
    timeout: 10000

- scrollUntilVisible:
    element: "E2E Aksam Pilates"
    direction: DOWN
    timeout: 15000
    speed: 40
    visibilityPercentage: 50
    waitToSettleTimeoutMs: 500

- assertVisible: "E2E Aksam Pilates"

- assertVisible: "Onay bekliyor"
