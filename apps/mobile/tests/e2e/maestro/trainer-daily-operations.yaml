appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true

- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 60000

- openLink: "fizyoflow://e2e-reset"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "Aç"
    commands:
      - tapOn: "Aç"

- openLink: "fizyoflow://e2e-login?email=elisauyar%40gmail.com&password=trainer123&redirect=%2F%28trainer%29%2Fhome"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "Aç"
    commands:
      - tapOn: "Aç"

- extendedWaitUntil:
    visible:
      id: "trainer-home-screen"
    timeout: 20000
- assertVisible: "Bugünkü seanslar"

- scrollUntilVisible:
    element:
      id: "trainer-home-session-0"
    direction: DOWN
    timeout: 15000
- assertVisible: "Bugünkü Reformer Seansı"
- assertVisible:
    id: "trainer-home-session-0-checkin"
- assertVisible:
    id: "trainer-home-session-0-member"
- assertVisible:
    id: "trainer-home-session-0-note"
- assertVisible:
    id: "trainer-home-session-0-schedule"

- tapOn:
    id: "trainer-home-session-0-note"
- extendedWaitUntil:
    visible: "Koç notları"
    timeout: 15000
- tapOn:
    id: "trainer-note-title-input"
- inputText: "E2E Seans Notu"
- tapOn:
    id: "trainer-note-body-input"
- inputText: "Danisanin seans sonrasi takip notu."
- scrollUntilVisible:
    element:
      id: "trainer-note-submit"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "trainer-note-submit"
- extendedWaitUntil:
    visible: "E2E Seans Notu"
    timeout: 15000
- scrollUntilVisible:
    element:
      id: "trainer-note-edit-0"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "trainer-note-edit-0"
- extendedWaitUntil:
    visible:
      id: "trainer-note-edit-body-input"
    timeout: 15000
- tapOn:
    id: "trainer-note-edit-body-input"
- eraseText
- inputText: "Danisanin guncellenmis E2E takip notu."
- scrollUntilVisible:
    element:
      id: "trainer-note-edit-submit"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "trainer-note-edit-submit"
- extendedWaitUntil:
    visible: "Danisanin guncellenmis E2E takip notu."
    timeout: 15000

- openLink: "fizyoflow://e2e-login?email=elisauyar%40gmail.com&password=trainer123&redirect=%2F%28trainer%29%2Fhome"
- extendedWaitUntil:
    visible:
      id: "trainer-home-screen"
    timeout: 20000
- scrollUntilVisible:
    element:
      id: "trainer-home-session-0-schedule"
    direction: DOWN
    timeout: 15000
- tapOn:
    id: "trainer-home-session-0-schedule"

- extendedWaitUntil:
    visible: "Ders özeti"
    timeout: 20000
- scrollUntilVisible:
    element:
      id: "trainer-calendar-open-reschedule"
    direction: DOWN
    timeout: 15000
- scrollUntilVisible:
    element:
      id: "trainer-calendar-cancel-booking"
    direction: DOWN
    timeout: 15000
- tapOn:
    id: "trainer-calendar-open-reschedule"
- extendedWaitUntil:
    visible: "Saat değişikliği öner"
    timeout: 15000
- tapOn: "Yeni saat .*"
- tapOn: "Öneriyi gönder"
- extendedWaitUntil:
    visible: "Saat değişikliği gönderildi"
    timeout: 20000
- tapOn: "Tamam|OK"
- openLink: "fizyoflow://e2e-login?email=elisauyar%40gmail.com&password=trainer123&redirect=%2F%28trainer%29%2Frequest-center"
- extendedWaitUntil:
    visible:
      id: "trainer-request-center-screen"
    timeout: 20000
- assertVisible: "Bekliyor"
