appId: com.clinerva.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true

- openLink: "clinerva://e2e-reset"

- openLink: "clinerva://e2e-login?email=oguzhanuyar531%40gmail.com&password=admin123&redirect=%2F%28admin%29%2Fdashboard"

- waitForAnimationToEnd:
    timeout: 8000

# Dashboard başlığı yerine doğrudan QR kartını bekliyoruz.
- scrollUntilVisible:
    element:
      id: "admin-dashboard-clinic-qr"
    direction: DOWN
    timeout: 30000
    speed: 40
    visibilityPercentage: 30
    centerElement: false

- tapOn:
    id: "admin-dashboard-clinic-qr"
    retryTapIfNoChange: true

- waitForAnimationToEnd:
    timeout: 7000

- assertVisible: "Salon QR kodu"
- assertVisible: "Yönlendirme hazır|Paylaşım hazır|Kurulum bekliyor"
- assertVisible: "Salon QR"

- swipe:
    start: 50%, 82%
    end: 50%, 26%

- assertVisible: "QR nasıl çalışır?"
- assertVisible: "Akıllı yönlendirme|Salon bağlantısı|Salon kodu"
- assertVisible: "QR’ı galeriye kaydet"