appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 60000
- openLink: "fizyoflow://e2e-reset"
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 20000
- openLink: "fizyoflow://e2e-login?email=oguzhanuyar531%40gmail.com&password=admin123&redirect=%2F%28admin%29%2Fsalon"
- extendedWaitUntil:
    visible:
      id: "admin-salon-screen"
    timeout: 20000
- tapOn:
    id: "admin-salon-edit-profile"
- extendedWaitUntil:
    visible:
      id: "admin-salon-profile-title"
    timeout: 15000
- tapOn:
    id: "admin-salon-profile-title"
- eraseText
- inputText: "FizyoFlow E2E Klinik Profili"
- scrollUntilVisible:
