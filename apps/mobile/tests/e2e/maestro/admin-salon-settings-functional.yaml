    timeout: 15000
- tapOn:
    id: "admin-salon-profile-save"
- extendedWaitUntil:
    visible: "Salon profili güncellendi"
    timeout: 20000
- tapOn: "Tamam|OK"
- openLink: "fizyoflow://e2e-login?email=oguzhanuyar531%40gmail.com&password=admin123&redirect=%2F%28admin%29%2Fsalon"
- extendedWaitUntil:
    visible: "FizyoFlow E2E Klinik Profili"
    timeout: 20000
- tapOn:
    id: "admin-salon-working-hours"
- extendedWaitUntil:
    visible:
      id: "admin-working-hours-day-7"
    timeout: 15000
- tapOn:
    id: "admin-working-hours-day-7"
- scrollUntilVisible:
    element:
      id: "admin-working-hours-save"
    direction: DOWN
    timeout: 15000
- tapOn:
    id: "admin-working-hours-save"
- extendedWaitUntil:
    visible: "Çalışma saatleri güncellendi|Çalışma saatleri kaydedildi"
    timeout: 20000
