appId: com.clinerva.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- assertVisible: "Clinerva"
- openLink: "clinerva://e2e-reset"
- assertVisible:
    id: "welcome-login-button"
- tapOn:
    id: "welcome-login-button"
    retryTapIfNoChange: true
- assertVisible: "Hesabına giriş yap"
- assertVisible:
    id: "login-identity-input"
- tapOn:
    id: "login-identity-input"
    retryTapIfNoChange: true
- inputText: "oguzhanuyar531@gmail.com"
- tapOn: "Clinerva hesabınla devam et"
- assertVisible:
    id: "login-password-input"
- tapOn:
    id: "login-password-input"
    retryTapIfNoChange: true
- inputText: "admin123"
- tapOn: "Clinerva hesabınla devam et"
- tapOn:
    id: "login-submit-button"
- waitForAnimationToEnd
- openLink: "clinerva://(admin)/packages"
- waitForAnimationToEnd
- assertVisible: "Paketler"
- swipe:
    start: 50%, 82%
    end: 50%, 42%
- assertVisible:
    id: "admin-package-title-input"
- tapOn:
    id: "admin-package-title-input"
- inputText: "E2E Grup Paketi"
- hideKeyboard
- waitForAnimationToEnd
- assertVisible:
    id: "admin-package-title-input"
- tapOn:
    id: "admin-package-save-button-inline"
- assertVisible: "Paket oluşturuldu"
- tapOn:
    text: "OK"
    optional: true
- assertVisible: "E2E Grup Paketi"
- assertVisible: "Bağlı grup dersleri:"
- tapOn:
    id: "admin-package-delete-e2e-grup-paketi"
- tapOn: "Sil"
- assertVisible: "Paket silindi"
