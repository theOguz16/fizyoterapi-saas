appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- assertVisible: "FizyoFlow"
- openLink: "fizyoflow://e2e-reset"
- assertVisible:
    id: "welcome-login-button"
- tapOn:
    id: "welcome-signup-button"
    retryTapIfNoChange: true
- assertVisible: "FizyoFlow’yı hangi rolde kullanacaksın?"
- scrollUntilVisible:
    element:
      id: "role-option-member"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 80
- tapOn:
    id: "role-option-member"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: "Başlangıçta en çok hangi hedefe odaklanıyorsun?"
- tapOn:
    id: "role-step-primarygoal-fitness"
- assertVisible: "Haftalık tempon hangisine daha yakın?"
- tapOn:
    id: "role-step-rhythm-steady"
- assertVisible: "Başlangıçta nasıl bir deneyim beklersin?"
- tapOn:
    id: "role-step-supportstyle-guided"
- assertVisible: "Hesabını oluştur"
- assertVisible:
    id: "register-email-input"
