appId: com.clinerva.mobile
---
# =====================================================================
# BÖLÜM 1: EĞİTMEN DERSİ OLUŞTURUR VE ONAYA GÖNDERİR
# =====================================================================
- launchApp:
    clearState: true
    clearKeychain: true
- openLink: "clinerva://e2e-reset"
- tapOn:
    id: "welcome-login-button"
    retryTapIfNoChange: true
- tapOn:
    id: "login-identity-input"
- inputText: "elisauyar@gmail.com"
- tapOn: "Clinerva hesabınla devam et"
- tapOn:
    id: "login-password-input"
- inputText: "trainer123"
- tapOn: "Clinerva hesabınla devam et"
- tapOn:
    id: "login-submit-button"
- waitForAnimationToEnd

- openLink: "clinerva://(trainer)/group-classes"
- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    id: "trainer-group-classes-name-input"
- eraseText: 50
- inputText: "E2E Aksam Reformer"
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 2000

- scrollUntilVisible:
    element:
      id: "trainer-group-classes-submit"
    direction: DOWN
- tapOn:
    id: "trainer-group-classes-submit"
- waitForAnimationToEnd:
    timeout: 6000

- tapOn:
    text: "Tamam"
    optional: true
- tapOn:
    text: "OK"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000

# Önce dış scroll ile "Aktif kayıtlar" başlığına in
- scrollUntilVisible:
    element: "Aktif kayıtlar"
    direction: DOWN
    timeout: 10000

# Sonra iç ScrollPanel container'ı içinde "E2E Aksam Reformer"'ı ara
- scrollUntilVisible:
    element: "E2E Aksam Reformer"
    direction: DOWN
    timeout: 15000
    speed: 40
    visibilityPercentage: 50
    waitToSettleTimeoutMs: 500
    container:
      id: "trainer-group-classes-list"

- assertVisible: "Onay Bekliyor"


# =====================================================================
# BÖLÜM 2: ADMİN DERSİ ONAYLAR
# =====================================================================
- launchApp:
    clearState: true
    clearKeychain: true
- openLink: "clinerva://e2e-reset"
- tapOn:
    id: "welcome-login-button"
    retryTapIfNoChange: true
- tapOn:
    id: "login-identity-input"
- inputText: "oguzhanuyar531@gmail.com"
- tapOn: "Clinerva hesabınla devam et"
- tapOn:
    id: "login-password-input"
- inputText: "admin123"
- tapOn: "Clinerva hesabınla devam et"
- tapOn:
    id: "login-submit-button"
- waitForAnimationToEnd

- openLink: "clinerva://approvals"
- waitForAnimationToEnd:
    timeout: 5000

- extendedWaitUntil:
    visible: "E2E Aksam Reformer"
    timeout: 15000

- tapOn: "Detayı aç"
- waitForAnimationToEnd
- scrollUntilVisible:
    element: "Onayla"
    direction: DOWN
- tapOn: "Onayla"
- waitForAnimationToEnd:
    timeout: 5000


