appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- assertVisible: "FizyoFlow"
- openLink: "fizyoflow://e2e-reset"
- assertVisible:
    id: "welcome-login-button"
- assertVisible: "Kliniğini kurmaya başla"
- tapOn:
    id: "welcome-signup-button"
    retryTapIfNoChange: true
- assertVisible: "Kliniğini kur veya davetinle katıl"
- scrollUntilVisible:
    element:
      id: "role-option-admin"
    direction: DOWN
    timeout: 10000
- assertVisible:
    id: "role-option-admin"
- tapOn:
    id: "role-option-admin"
- extendedWaitUntil:
    visible: "Hesabını oluştur"
    timeout: 10000
- assertVisible: "Klinik sahibi hesabı"
- scrollUntilVisible:
    element:
      id: "register-email-input"
    direction: DOWN
    timeout: 10000
- assertNotVisible: "₺349.99"
