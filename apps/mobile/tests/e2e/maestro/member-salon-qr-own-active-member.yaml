appId: com.clinerva.mobile
name: member-salon-qr-own-active-member
---
- launchApp:
    clearState: true
    clearKeychain: true

- openLink: "clinerva://e2e-reset"

- assertVisible:
    id: "welcome-login-button"

- tapOn:
    id: "welcome-login-button"
    retryTapIfNoChange: true

- assertVisible: "Hesabına giriş yap"

- tapOn:
    id: "login-identity-input"
    retryTapIfNoChange: true
- inputText: "member@gmail.com"

- tapOn: "Clinerva hesabınla devam et"

- tapOn:
    id: "login-password-input"
    retryTapIfNoChange: true
- inputText: "member123"

- tapOn: "Clinerva hesabınla devam et"

- tapOn:
    id: "login-submit-button"

- waitForAnimationToEnd:
    timeout: 5000

# Member zaten demo-salon'a bağlıyken kendi salon QR'ını açıyor.
- openLink: "clinerva://join/demo-salon?salon_slug=demo-salon&screen_path=%2F%28intake-member%29%2Fsalons%2Fdemo-salon&source=salon_qr&channel=qr"

- waitForAnimationToEnd:
    timeout: 5000

# Intake-member salon kayıt ekranına düşmemeli, member ana akışta kalmalı.
- assertVisible:
    text: "Merhaba Demo|Ana Sayfa|Randevu|Paket|Profil"