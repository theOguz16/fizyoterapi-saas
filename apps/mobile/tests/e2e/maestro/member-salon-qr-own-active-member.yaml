appId: com.fizyoflow.mobile
name: member-salon-qr-own-active-member
---
- launchApp:
    clearState: true
    clearKeychain: true

- tapOn:
    text: "Aç"
    optional: true

- openLink: "fizyoflow://e2e-reset"

- waitForAnimationToEnd:
    timeout: 3000

- assertVisible:
    id: "welcome-login-button"
- tapOn:
    id: "welcome-login-button"
- tapOn:
    id: "login-identity-input"
- inputText: "member@gmail.com"
- tapOn: "Hesabına giriş yap"
- tapOn:
    id: "login-password-input"
- inputText: "member123"
- tapOn:
    id: "login-submit-button"

- extendedWaitUntil:
    visible:
      id: "member-home-profile-button"
    timeout: 20000

# Member zaten demo-salon'a bağlıyken kendi salon QR'ını açıyor.
- openLink: "fizyoflow://join/demo-salon?salon_slug=demo-salon&screen_path=%2F%28intake-member%29%2Fsalons%2Fdemo-salon&source=salon_qr&channel=qr"

- extendedWaitUntil:
    visible:
      id: "member-home-profile-button"
    timeout: 20000

# Aktif üye kendi salon QR'ını açınca intake kayıt ekranına düşmeden güvenli akışta kalır.
- assertVisible:
    id: "member-home-profile-button"
