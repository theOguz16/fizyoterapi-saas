appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- openLink: "fizyoflow://e2e-reset"
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 20000
- openLink: "fizyoflow:///e2e-login?skipAuth=1&redirect=%2F%28intake-member%29%2Fe2e-multi-package%3Fslug%3Ddemo-salon"
- extendedWaitUntil:
    visible: "Başvurunu gözden geçir"
    timeout: 20000
- assertVisible:
    text: "2 paket|Grup dersi katılımı"
