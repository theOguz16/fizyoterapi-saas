appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 20000
- tapOn:
    id: "welcome-login-button"
- tapOn:
    id: "login-identity-input"
- inputText: ${PUSH_E2E_EMAIL}
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "login-password-input"
    direction: DOWN
- tapOn:
    id: "login-password-input"
    retryTapIfNoChange: true
- inputText: ${PUSH_E2E_PASSWORD}
- tapOn:
    id: "login-submit-button"
- extendedWaitUntil:
    visible:
      id: "notification-permission-allow"
    timeout: 30000
- tapOn:
    id: "notification-permission-allow"
- extendedWaitUntil:
    visible: "Don.t Allow|İzin Verme"
    timeout: 10000
- tapOn: "Don.t Allow|İzin Verme"
- extendedWaitUntil:
    visible:
      id: ${PUSH_E2E_HOME_ID}
    timeout: 30000
- assertVisible:
    id: ${PUSH_E2E_HOME_ID}
- takeScreenshot: ${PUSH_E2E_SCREENSHOT}
