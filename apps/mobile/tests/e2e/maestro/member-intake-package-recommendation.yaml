appId: com.fizyoflow.mobile
---
- launchApp:
    clearState: true
    clearKeychain: true
- openLink: "fizyoflow://e2e-reset"
- assertVisible:
    id: "welcome-login-button"
- openLink: "fizyoflow://(intake-member)"
- assertVisible: "Kliniğine bağlan"
- tapOn:
    id: "member-connect-discovery"
- assertVisible: "Nasıl bir hizmeti incelemek istersin?"
- scrollUntilVisible:
    element:
      id: "member-intake-goal-grup-dersi"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "member-intake-goal-grup-dersi"
- scrollUntilVisible:
    element:
      id: "member-intake-expectation-yakin-olsun"
    direction: UP
    timeout: 10000
- tapOn:
    id: "member-intake-expectation-yakin-olsun"
- scrollUntilVisible:
    element:
      id: "member-intake-weeklyDays-2-gun"
    direction: UP
    timeout: 10000
- tapOn:
    id: "member-intake-weeklyDays-2-gun"
- scrollUntilVisible:
    element:
      id: "member-intake-timePreference-sabah"
    direction: UP
    timeout: 10000
- tapOn:
    id: "member-intake-timePreference-sabah"
- openLink: "fizyoflow://(intake-member)/packages?slug=demo-salon"
- assertVisible: "Paket seç"
- scrollUntilVisible:
    element:
      id: "intake-package-recommended-surface"
    direction: DOWN
    timeout: 30000
    speed: 80
    visibilityPercentage: 30
- assertVisible: ".*Sana özel öneri.*"
- assertVisible:
    id: "intake-package-card-0"
