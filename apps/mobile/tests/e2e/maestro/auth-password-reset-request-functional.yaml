appId: com.fizyoflow.mobile
name: auth-password-reset-request-functional
---
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 60000
- waitForAnimationToEnd
- tapOn:
    id: "welcome-login-button"
- extendedWaitUntil:
    visible:
      id: "login-submit-button"
    timeout: 10000
- waitForAnimationToEnd
- tapOn:
    id: "login-forgot-password"
- tapOn:
    id: "password-reset-email-input"
- inputText: "gecersiz"
- tapOn:
    id: "password-reset-request-submit"
- assertVisible:
    id: "password-reset-error"
- tapOn:
    id: "password-reset-email-input"
- eraseText
- inputText: "password.reset.e2e@demo.local"
- tapOn:
    id: "password-reset-request-submit"
- extendedWaitUntil:
    visible:
      id: "password-reset-request-accepted"
    timeout: 10000
- assertVisible:
    id: "password-reset-token-input"
