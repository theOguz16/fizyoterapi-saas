appId: com.fizyoflow.mobile
name: member-salon-qr-invalid-salon
---
- launchApp:
    clearState: true
    clearKeychain: true

- openLink: "fizyoflow://e2e-reset"

- waitForAnimationToEnd:
    timeout: 3000

- openLink: "fizyoflow://join/not-existing-salon?salon_slug=not-existing-salon&screen_path=%2F%28intake-member%29%2Fsalons%2Fnot-existing-salon&source=salon_qr&channel=qr"

- extendedWaitUntil:
    visible:
      id: "salon-not-found-screen"
    timeout: 20000

- assertVisible: "Salon bulunamadı"
- assertVisible:
    id: "salon-not-found-retry-button"
- assertVisible:
    id: "salon-not-found-discovery"
