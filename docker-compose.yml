version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fitnes-saas-postgres
    environment:
      POSTGRES_DB: fitnes_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fitnes_saas"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
